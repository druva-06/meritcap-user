name: Deploy User Frontend

on:
  push:
    branches: [dev, uat, main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/meritcap-user

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name == 'uat' && 'uat' || 'dev' }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set environment
        id: env
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          if [ "$BRANCH" = "main" ]; then
            echo "env=prod" >> $GITHUB_OUTPUT
            echo "namespace=prod" >> $GITHUB_OUTPUT
            echo "api_url=https://api.meritcap.com" >> $GITHUB_OUTPUT
            echo "vps_host=${{ secrets.VPS_HOST_PROD }}" >> $GITHUB_OUTPUT
          elif [ "$BRANCH" = "uat" ]; then
            echo "env=uat" >> $GITHUB_OUTPUT
            echo "namespace=uat" >> $GITHUB_OUTPUT
            echo "api_url=https://api-uat.meritcap.com" >> $GITHUB_OUTPUT
            echo "vps_host=${{ secrets.VPS_HOST_UAT }}" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
            echo "namespace=dev" >> $GITHUB_OUTPUT
            echo "api_url=https://api-dev.meritcap.com" >> $GITHUB_OUTPUT
            echo "vps_host=${{ secrets.VPS_HOST_DEV }}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ steps.env.outputs.api_url }} \
            -t $REGISTRY/$IMAGE_NAME:${{ steps.env.outputs.env }}-${{ github.sha }} .
          docker tag $REGISTRY/$IMAGE_NAME:${{ steps.env.outputs.env }}-${{ github.sha }} \
                     $REGISTRY/$IMAGE_NAME:${{ steps.env.outputs.env }}-latest
          docker push $REGISTRY/$IMAGE_NAME:${{ steps.env.outputs.env }}-${{ github.sha }}
          docker push $REGISTRY/$IMAGE_NAME:${{ steps.env.outputs.env }}-latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.env.outputs.vps_host }}
          username: deployer
          key: ${{ steps.env.outputs.env == 'prod' && secrets.VPS_SSH_KEY_PROD || (steps.env.outputs.env == 'uat' && secrets.VPS_SSH_KEY_UAT || secrets.VPS_SSH_KEY_DEV) }}
          script: |
            microk8s kubectl set image deployment/meritcap-user \
              meritcap-user=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.env.outputs.env }}-${{ github.sha }} \
              -n ${{ steps.env.outputs.namespace }}
            microk8s kubectl rollout status deployment/meritcap-user \
              -n ${{ steps.env.outputs.namespace }} --timeout=120s
